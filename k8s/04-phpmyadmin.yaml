# ============================================================
#  phpMyAdmin (gestión visual de la base de datos)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rp-phpmyadmin
  namespace: rp-travels
  labels: { app: rp-phpmyadmin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: rp-phpmyadmin }
  template:
    metadata:
      labels: { app: rp-phpmyadmin }
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin/phpmyadmin:latest
          env:
            - name: PMA_HOST
              value: "rp-db"
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: rp-phpmyadmin
  namespace: rp-travels
spec:
  type: NodePort
  selector: { app: rp-phpmyadmin }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081         # http://<IP-del-nodo>:30081
